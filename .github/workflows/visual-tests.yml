name: Visual Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  visual-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    
    - name: Generate/update visual snapshots
      run: npm run test:visual:update
    
    - name: Run visual tests
      run: npm run test:visual
      continue-on-error: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: |
          playwright-report/
          test-results/
        retention-days: 30
    
    - name: Upload baseline screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: visual-test-screenshots
        path: test-visual/__snapshots__/
        retention-days: 7
    
    - name: Commit updated snapshots
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add test-visual/__snapshots__/
        git diff --staged --quiet || (git commit -m "chore: update visual test snapshots [skip ci]" && git push)
